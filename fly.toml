app = 'pyp6xer-mcp'
primary_region = 'lhr'

[build]

[env]
  FASTMCP_TRANSPORT      = "http"
  FASTMCP_STATELESS_HTTP = "true"
  FASTMCP_HOST           = "0.0.0.0"
  FASTMCP_PORT           = "5000"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/health"
    timeout = "5s"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
